name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to Hugging Face
        uses: huggingface/spaces-github-action@main
        with:
          space: harsh0o23/smart-agro-api
          token: ${{ secrets.HF_TOKEN }}
